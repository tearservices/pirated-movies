<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUMINA PLATINUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #020202;
            --panel: rgba(255,255,255,0.04);
            --glass: rgba(10, 10, 10, 0.7);
            --danger: #ff4b4b;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            width: 100vw; height: 100vh; overflow: hidden; 
        }

        /* --- SECURITY LAYER --- */
        #player-view { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; }
        .iframe-jail { width: 100%; height: 100%; border: none; }
        .player-err { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1; background: #000; }

        /* --- ORIGINAL UI STYLES --- */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes wiggle { 
            0% { transform: rotate(0deg); } 25% { transform: rotate(-1deg); } 
            75% { transform: rotate(1deg); } 100% { transform: rotate(0deg); } 
        }
        .fade-in { animation: fadeIn 0.8s var(--ease) forwards; }

        #profile-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .p-card { position: relative; transition: 0.4s var(--ease); cursor: pointer; }
        .p-avatar { width: 10vw; height: 10vw; min-width: 120px; border-radius: 22%; background: linear-gradient(135deg, #1a1a1a, #0a0a0a); border: 2px solid rgba(255,255,255,0.1); font-size: 3rem; display: flex; align-items: center; justify-content: center; font-weight: 200; }
        .p-card:hover .p-avatar { transform: scale(1.1); border-color: var(--accent); box-shadow: 0 0 50px rgba(0, 242, 255, 0.2); }
        .managing .p-card { animation: wiggle 0.3s infinite; }
        .del-btn { position: absolute; top: -10px; right: -10px; background: var(--danger); width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 800; }
        .managing .del-btn { display: flex; }

        nav { position: fixed; top: 0; width: 100%; padding: 1.5rem 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 1000; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
        .search-wrap { position: relative; }
        .search-bar { background: var(--panel); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem 1.5rem; border-radius: 12px; width: 25vw; color: #fff; transition: 0.4s var(--ease); font-size: 1rem; }
        .search-bar:focus { width: 35vw; border-color: var(--accent); outline: none; background: rgba(255,255,255,0.08); }
        
        #search-suggest { position: absolute; top: 110%; left: 0; right: 0; background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; display: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .suggest-item { padding: 12px 20px; border-bottom: 1px solid #222; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .suggest-item:hover { background: var(--accent); color: #000; }

        #main-content { height: 100vh; overflow-y: scroll; scrollbar-width: none; }
        .hero { height: 85vh; width: 100%; position: relative; display: flex; align-items: flex-end; padding: 0 4% 12vh; background-size: cover; background-position: center; }
        .hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, #000 0%, transparent 60%); }
        .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg) 0%, transparent 50%); }
        .hero-meta { position: relative; z-index: 5; max-width: 45%; animation: fadeIn 1s var(--ease); }

        .row { margin: 3rem 0 0 4%; }
        .row-title { font-size: 0.9rem; font-weight: 800; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; margin-bottom: 1rem;}
        .shelf { display: flex; gap: 1.2rem; overflow-x: auto; padding: 1rem 0; scrollbar-width: none; }
        .card { flex: 0 0 14vw; min-width: 180px; aspect-ratio: 2/3; position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.5s var(--ease); }
        .card:hover { transform: scale(1.05); z-index: 2; box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-del { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .card:hover .card-del { opacity: 1; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .glass-box { background: #0a0a0a; padding: 4rem; border-radius: 30px; width: 500px; text-align: center; border: 1px solid rgba(255,255,255,0.05); animation: scaleIn 0.5s var(--ease); }
        .btn { padding: 1rem 2.5rem; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-glow { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 242, 255, 0.6); }
        input[type="text"] { width: 100%; padding: 1.2rem; background: #111; border: 1px solid #222; color: #fff; border-radius: 15px; margin: 2rem 0; font-size: 1.5rem; text-align: center; }
    </style>
</head>
<body>

<script>
    window.open = function() { console.warn("LUMINA: Redirect attempt blocked."); return null; };
</script>

<div id="modal-account" class="overlay">
    <div class="glass-box">
        <h1 style="font-weight: 800; margin: 0;">NEW PROFILE</h1>
        <p style="opacity: 0.5;">Enter a name to sync your history</p>
        <input type="text" id="acc-name-input" placeholder="Discovery...">
        <div style="display: flex; gap: 15px; justify-content: center;">
            <button class="btn btn-glow" onclick="createAccount()">Confirm</button>
            <button class="btn" style="background:transparent; color:#fff;" onclick="closeModals()">Cancel</button>
        </div>
    </div>
</div>

<div id="profile-screen">
    <h1 style="font-weight: 200; font-size: 4rem; letter-spacing: 20px; margin-bottom: 5vh;" class="fade-in">LUMINA</h1>
    <div id="p-list" style="display: flex; gap: 3vw; margin-bottom: 8vh;"></div>
    <div style="display: flex; gap: 20px;" class="fade-in">
        <button class="btn btn-glow" onclick="showAddAcc()">+ Create Profile</button>
        <button class="btn" style="background: rgba(255,255,255,0.05); color: #fff;" onclick="toggleManage()">Edit Profiles</button>
    </div>
</div>

<div id="main-ui" style="display:none">
    <nav>
        <div style="font-weight: 800; font-size: 2rem; color: var(--accent); cursor: pointer;" onclick="goHome()">LUMINA</div>
        <div class="search-wrap">
            <input type="text" id="main-search" class="search-bar" placeholder="Movies, TV, People..." autocomplete="off">
            <div id="search-suggest"></div>
        </div>
        <div id="user-pill" style="padding: 10px 20px; background: var(--panel); border-radius: 50px; font-size: 0.8rem; font-weight: 600;"></div>
    </nav>

    <div id="main-content">
        <div id="hero" class="hero">
            <div class="hero-meta">
                <h1 id="hero-title" style="font-size: 4.5rem; margin: 0; line-height: 1;">---</h1>
                <p id="hero-desc" style="opacity: 0.7; margin: 2rem 0; font-size: 1.2rem;"></p>
                <button class="btn btn-glow" id="hero-btn">Watch Now</button>
            </div>
        </div>

        <div id="row-history" class="row" style="display:none">
            <div class="row-title">Continue Watching</div>
            <div id="shelf-history" class="shelf"></div>
        </div>

        <div class="row">
            <div id="row-dynamic-title" class="row-title">Trending Now</div>
            <div id="shelf-main" class="shelf"></div>
        </div>
    </div>
</div>

<div id="player-view">
    <div class="player-err" id="player-err">
        <h1 style="font-size: 3rem;">MEDIA UNAVAILABLE</h1>
        <p style="opacity:0.5; margin-bottom: 2rem;">This source is currently offline or blocked by your region.</p>
        <button class="btn btn-glow" onclick="closePlayer()">Go Back</button>
    </div>
    <div style="position:absolute; top:30px; left:30px; z-index:10; display:flex; gap:15px;">
        <button class="btn" style="background:rgba(0,0,0,0.6); color:#fff; backdrop-filter:blur(10px);" onclick="closePlayer()">✕ Close</button>
        <div id="tv-controls" style="display:none; gap:10px;">
            <select id="sel-s" style="background:#222; color:#fff; padding:10px; border-radius:8px;" onchange="changeEp()"></select>
            <select id="sel-e" style="background:#222; color:#fff; padding:10px; border-radius:8px;" onchange="changeEp()"></select>
        </div>
    </div>
    <div id="iframe-mount" style="width:100%; height:100%;"></div>
</div>

<script>
    const TMDB_API = 'ebbc810d0c9a9a4a13a264f96897036e';
    const SUPA_URL = 'https://nkjizlebtlmgmtqaonot.supabase.co/rest/v1/watch_history';
    const SUPA_KEY = 'sb_publishable_6orhng6zssRe45KcOFnqXQ_78xgw6Oc';

    let accounts = JSON.parse(localStorage.getItem('lumina_v5') || '["Guest"]');
    let activeUser = null;
    let isManaging = false;
    let currentId = null;

    function renderProfiles() {
        const list = document.getElementById('p-list');
        list.className = isManaging ? 'managing' : '';
        list.innerHTML = accounts.map(a => `
            <div class="p-card" onclick="login('${a}')">
                <div class="del-btn" onclick="deleteAccount(event, '${a}')">✕</div>
                <div class="p-avatar">${a[0]}</div>
                <div style="margin-top:15px; font-weight:600; text-align:center;">${a}</div>
            </div>
        `).join('');
    }

    function showAddAcc() { document.getElementById('modal-account').style.display = 'flex'; document.getElementById('acc-name-input').focus(); }
    function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }
    
    function createAccount() {
        const name = document.getElementById('acc-name-input').value.trim();
        if(name && !accounts.includes(name)) {
            accounts.push(name);
            localStorage.setItem('lumina_v5', JSON.stringify(accounts));
            renderProfiles();
            closeModals();
        }
    }

    function deleteAccount(e, name) {
        e.stopPropagation();
        if(name === "Guest") return;
        accounts = accounts.filter(a => a !== name);
        localStorage.setItem('lumina_v5', JSON.stringify(accounts));
        renderProfiles();
    }

    function toggleManage() { isManaging = !isManaging; renderProfiles(); }

    function login(name) {
        if(isManaging) return;
        activeUser = name;
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('user-pill').innerText = name.toUpperCase();
        loadHome();
    }

    async function loadHome() {
        const res = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${TMDB_API}`);
        const data = await res.json();
        const featured = data.results[0];
        document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${featured.backdrop_path})`;
        document.getElementById('hero-title').innerText = featured.title || featured.name;
        document.getElementById('hero-desc').innerText = featured.overview.slice(0, 180) + '...';
        document.getElementById('hero-btn').onclick = () => playMedia(featured.media_type, featured.id);
        renderGrid(data.results, 'shelf-main');
        loadHistory();
    }

    function renderGrid(items, targetId) {
        document.getElementById(targetId).innerHTML = items.map(i => i.poster_path ? `
            <div class="card fade-in" onclick="playMedia('${i.media_type||'movie'}', ${i.id})">
                <img src="https://image.tmdb.org/t/p/w500${i.poster_path}">
            </div>
        ` : '').join('');
    }

    // --- SECURE PLAYER ENGINE ---
    async function playMedia(type, id, s=1, e=1) {
        currentId = id;
        const view = document.getElementById('player-view');
        const mount = document.getElementById('iframe-mount');
        const err = document.getElementById('player-err');
        
        view.style.display = 'block';
        err.style.display = 'none';
        
        // VIDKING API ENDPOINTS
        const url = type === 'movie' 
            ? `https://www.vidking.net/embed/movie/${id}` 
            : `https://www.vidking.net/embed/tv/${id}/${s}/${e}`;

        /* FORTRESS SANDBOX: 
         * No 'allow-popups', no 'allow-top-navigation'.
         * This ensures the video player cannot escape the frame.
         */
        mount.innerHTML = `<iframe 
            src="${url}" 
            class="iframe-jail"
            sandbox="allow-scripts allow-same-origin allow-forms allow-presentation" 
            allowfullscreen>
        </iframe>`;
        
        setTimeout(() => {
            if(!mount.innerHTML.includes('iframe')) err.style.display = 'flex';
        }, 5000);

        if(type === 'tv') {
            document.getElementById('tv-controls').style.display = 'flex';
            const tv = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_API}`).then(r => r.json());
            document.getElementById('sel-s').innerHTML = tv.seasons.map(sea => `<option value="${sea.season_number}" ${sea.season_number==s?'selected':''}>S${sea.season_number}</option>`).join('');
            const epData = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${TMDB_API}`).then(r => r.json());
            document.getElementById('sel-e').innerHTML = epData.episodes.map(ep => `<option value="${ep.episode_number}" ${ep.episode_number==e?'selected':''}>E${ep.episode_number}</option>`).join('');
        }
        saveHistory(type, id, s, e);
    }

    function changeEp() {
        playMedia('tv', currentId, document.getElementById('sel-s').value, document.getElementById('sel-e').value);
    }

    function closePlayer() {
        document.getElementById('player-view').style.display = 'none';
        document.getElementById('iframe-mount').innerHTML = '';
        loadHistory();
    }

    async function saveHistory(type, id, s, e) {
        const rows = await fetch(`${SUPA_URL}?user_ip=eq.${activeUser}`, { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }).then(r => r.json());
        const data = rows[0]?.data || {};
        data[id] = { type, s, e, ts: Date.now() };
        await fetch(SUPA_URL, {
            method: 'POST',
            headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ user_ip: activeUser, data })
        });
    }

    async function removeHistory(id) {
        const rows = await fetch(`${SUPA_URL}?user_ip=eq.${activeUser}`, { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }).then(r => r.json());
        const data = rows[0]?.data || {};
        delete data[id];
        await fetch(SUPA_URL, {
            method: 'POST',
            headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ user_ip: activeUser, data })
        });
        loadHistory();
    }

    async function loadHistory() {
        const rows = await fetch(`${SUPA_URL}?user_ip=eq.${activeUser}`, { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` } }).then(r => r.json());
        if(rows[0]?.data) {
            const items = Object.entries(rows[0].data).sort((a,b) => b[1].ts - a[1].ts).slice(0, 10);
            if(items.length === 0) { document.getElementById('row-history').style.display = 'none'; return; }
            document.getElementById('row-history').style.display = 'block';
            const shelf = document.getElementById('shelf-history');
            shelf.innerHTML = '';
            for(const [id, meta] of items) {
                const info = await fetch(`https://api.themoviedb.org/3/${meta.type}/${id}?api_key=${TMDB_API}`).then(r => r.json());
                shelf.innerHTML += `
                    <div class="card fade-in">
                        <div class="card-del" onclick="event.stopPropagation(); removeHistory(${id})">✕</div>
                        <img src="https://image.tmdb.org/t/p/w342${info.poster_path}" onclick="playMedia('${meta.type}', ${id}, ${meta.s}, ${meta.e})">
                    </div>`;
            }
        }
    }

    const sInput = document.getElementById('main-search');
    const sSuggest = document.getElementById('search-suggest');

    sInput.addEventListener('input', async (e) => {
        const q = e.target.value;
        if(q.length < 2) { sSuggest.style.display = 'none'; return; }
        const data = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API}&query=${q}`).then(r => r.json());
        sSuggest.innerHTML = data.results.slice(0, 5).map(i => `
            <div class="suggest-item" onclick="handleSearchSelect('${i.title||i.name}')">
                <img src="https://image.tmdb.org/t/p/w92${i.poster_path||''}" width="30">
                <span>${i.title || i.name}</span>
            </div>
        `).join('');
        sSuggest.style.display = 'block';
    });

    function handleSearchSelect(name) { sInput.value = name; sSuggest.style.display = 'none'; executeSearch(name); }
    sInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') executeSearch(sInput.value); });

    async function executeSearch(q) {
        document.getElementById('row-dynamic-title').innerText = "Results for: " + q;
        document.getElementById('row-history').style.display = 'none';
        const data = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API}&query=${q}`).then(r => r.json());
        renderGrid(data.results, 'shelf-main');
        sSuggest.style.display = 'none';
    }

    function goHome() {
        document.getElementById('row-dynamic-title').innerText = "Trending Now";
        sInput.value = "";
        loadHome();
    }

    renderProfiles();
</script>
</body>
</html>s
