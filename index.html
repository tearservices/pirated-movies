<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Private Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #bb86fc; --bg: #080808; --surface: #121212; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, var(--bg) 80%); }
        nav { position: sticky; top: 0; z-index: 1000; padding: 20px 5%; backdrop-filter: blur(25px); background: rgba(8, 8, 8, 0.7); border-bottom: 1px solid var(--border); display: flex; justify-content: center; }
        #search { width: 100%; max-width: 600px; background: var(--glass); border: 1px solid var(--border); padding: 15px 25px; border-radius: 14px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; }
        .container { padding: 30px 5%; }
        section { margin-bottom: 50px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-weight: 700; font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .clear-btn { font-size: 0.7rem; color: #ff5555; cursor: pointer; opacity: 0.6; text-transform: uppercase; border: 1px solid #ff5555; padding: 4px 8px; border-radius: 4px; }
        .shelf { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .shelf::-webkit-scrollbar { display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .card { background: var(--surface); border-radius: 20px; overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); border: 1px solid var(--border); position: relative; flex: 0 0 220px; }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-info { padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); position: absolute; bottom: 0; width: 100%; }
        .card-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 0.75rem; color: var(--accent); font-weight: 700; }
        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; }
        .player-bar { height: 70px; padding: 0 30px; display: flex; align-items: center; justify-content: space-between; background: #080808; border-bottom: 1px solid var(--border); }
        .video-container { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--border); padding: 10px 22px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        select { background: #1a1a1a; color: #fff; border: 1px solid var(--border); padding: 10px; border-radius: 10px; }
        #resume-btn { position: absolute; bottom: 40px; right: 40px; background: var(--accent); color: #000; padding: 22px 35px; border-radius: 18px; font-weight: 800; cursor: pointer; display: none; z-index: 3000; border: 2px solid #fff; }
        #next-btn { position: absolute; bottom: 40px; left: 40px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: #fff; padding: 15px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; display: none; z-index: 3000; border: 1px solid var(--border); }
        #sync-status { position: fixed; top: 90px; right: 20px; font-size: 10px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-weight: 800; display: none; }
    </style>
</head>
<body>

<div id="sync-status">● Cloud Syncing</div>

<div id="main-ui">
    <nav><input type="text" id="search" placeholder="Search movies, TV shows..." autocomplete="off"></nav>
    <div class="container">
        <section id="continue-section" style="display: none;">
            <h2>Continue Watching <span class="clear-btn" onclick="clearCloudHistory()">Clear All</span></h2>
            <div id="continue-shelf" class="shelf"></div>
        </section>
        <section>
            <h2 id="discover-label">Trending Now</h2>
            <div id="grid" class="grid"></div>
        </section>
    </div>
</div>

<div id="player-view">
    <div class="player-bar">
        <button class="btn" onclick="location.hash='#/'">EXIT</button>
        <div id="tv-controls" style="display:none; gap: 12px;">
            <select id="s-select" onchange="changeSeason()"></select>
            <select id="e-select" onchange="updateStream()"></select>
        </div>
        <span id="p-title" style="opacity: 0.4; font-size: 0.8rem;"></span>
    </div>
    <div class="video-container">
        <div id="resume-btn">RESUME S<span id="res-s"></span> E<span id="res-e"></span> @ <span id="res-t"></span>m</div>
        <div id="next-btn" onclick="playNextEpisode()">NEXT EPISODE →</div>
        <div id="player-mount" style="height: 100%;"></div>
    </div>
</div>

<script>
    const CONFIG = {
        SUPA_URL: 'https://nkjizlebtlmgmtqaonot.supabase.co',
        SUPA_KEY: 'sb_publishable_6orhng6zssRe45KcOFnqXQ_78xgw6Oc',
        TMDB_KEY: 'ebbc810d0c9a9a4a13a264f96897036e'
    };

    let cur = { id: null, type: null, s: 1, e: 1 };
    let userIP = 'guest-' + Date.now();
    let lastSavedTime = 0;

    // --- SUPABASE WRAPPER ---
    async function api(method, body = null) {
        try {
            const options = {
                method,
                headers: { 
                    'apikey': CONFIG.SUPA_KEY, 'Authorization': `Bearer ${CONFIG.SUPA_KEY}`, 
                    'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates'
                }
            };
            if (body) options.body = JSON.stringify(body);
            const url = `${CONFIG.SUPA_URL}/rest/v1/watch_history${method === 'GET' ? `?user_ip=eq.${userIP}` : ''}`;
            const res = await fetch(url, options);
            return res.ok ? await res.json() : [];
        } catch (e) { return []; }
    }

    async function init() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            userIP = data.ip;
        } catch (e) { console.warn("Using fallback ID"); }
        loadShelf();
        router();
        if(!location.hash) fetchTrending();
    }

    async function loadShelf() {
        const data = await api('GET');
        if (data?.[0]?.data) {
            const shelf = document.getElementById('continue-shelf');
            const entries = Object.entries(data[0].data).reverse().slice(0, 10);
            if (entries.length === 0) return;
            document.getElementById('continue-section').style.display = 'block';
            shelf.innerHTML = '';
            for (const [id, meta] of entries) {
                const r = await fetch(`https://api.themoviedb.org/3/${meta.type||'movie'}/${id}?api_key=${CONFIG.TMDB_KEY}`);
                const movie = await r.json();
                shelf.innerHTML += `<div class="card" onclick="handleEntry('${meta.type||'movie'}','${id}')">
                    <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}"><div class="card-info">
                    <div class="card-title">${movie.title||movie.name}</div><div class="card-meta">S${meta.s} E${meta.e}</div></div></div>`;
            }
        }
    }

    async function handleEntry(type, id) {
        const result = await api('GET');
        const saved = result[0]?.data?.[id];
        location.hash = (type === 'tv' && saved) ? `#/watch/tv/${id}/${saved.s}/${saved.e}` : `#/watch/${type}/${id}`;
    }

    async function router() {
        const h = location.hash;
        if(!h.startsWith('#/watch/')) {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('player-mount').innerHTML = '';
            loadShelf(); return;
        }
        const p = h.split('/');
        cur = { type: p[2], id: p[3], s: parseInt(p[4])||1, e: parseInt(p[5])||1 };
        document.getElementById('player-view').style.display = 'flex';
        const r = await fetch(`https://api.themoviedb.org/3/${cur.type}/${cur.id}?api_key=${CONFIG.TMDB_KEY}`);
        const data = await r.json();
        document.getElementById('p-title').innerText = data.title || data.name;
        
        if(cur.type === 'tv') {
            document.getElementById('tv-controls').style.display = 'flex';
            const epRes = await fetch(`https://api.themoviedb.org/3/tv/${cur.id}/season/${cur.s}?api_key=${CONFIG.TMDB_KEY}`);
            const epData = await epRes.json();
            document.getElementById('s-select').innerHTML = data.seasons.map(s => `<option value="${s.season_number}" ${s.season_number == cur.s ? 'selected' : ''}>${s.name}</option>`).join('');
            document.getElementById('e-select').innerHTML = epData.episodes.map(e => `<option value="${e.episode_number}" ${e.episode_number == cur.e ? 'selected' : ''}>Ep ${e.episode_number}</option>`).join('');
        } else document.getElementById('tv-controls').style.display = 'none';
        
        startStream();
    }

    function startStream(seek = null) {
        const mount = document.getElementById('player-mount');
        const btn = document.getElementById('resume-btn');
        document.getElementById('next-btn').style.display = 'none';
        let url = cur.type === 'movie' ? `https://www.vidking.net/embed/movie/${cur.id}` : `https://www.vidking.net/embed/tv/${cur.id}/${cur.s}/${cur.e}`;
        url += `?color=bb86fc&autoplay=1`;
        if(seek) url += `&progress=${Math.floor(seek)}&t=${Date.now()}`;
        
        mount.innerHTML = `<div style="padding:100px; text-align:center; color:var(--accent)">LOADING...</div>`;
        setTimeout(() => { mount.innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"></iframe>`; }, 200);

        api('GET').then(res => {
            const saved = res[0]?.data?.[cur.id];
            if(saved && saved.t > 15 && !seek && (cur.type === 'movie' || (saved.s == cur.s && saved.e == cur.e))) {
                btn.style.display = 'block';
                document.getElementById('res-s').innerText = saved.s; document.getElementById('res-e').innerText = saved.e;
                document.getElementById('res-t').innerText = Math.floor(saved.t / 60);
                btn.onclick = () => { btn.style.display = 'none'; startStream(saved.t); };
            }
        });
    }

    window.addEventListener('message', async (e) => {
        try {
            let m = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
            if (m.data?.currentTime) {
                const now = m.data.currentTime;
                if(cur.type === 'tv' && (m.data.duration - now) < 120) document.getElementById('next-btn').style.display = 'block';
                if (Math.abs(now - lastSavedTime) > 10) {
                    lastSavedTime = now;
                    const res = await api('GET');
                    let history = res[0]?.data || {};
                    history[cur.id] = { t: now, s: m.data.season || cur.s, e: m.data.episode || cur.e, type: cur.type };
                    await api('POST', { user_ip: userIP, data: history });
                    document.getElementById('sync-status').style.display = 'block';
                    setTimeout(() => document.getElementById('sync-status').style.display = 'none', 1500);
                }
            }
        } catch(err) {}
    });

    async function fetchTrending() {
        const r = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${CONFIG.TMDB_KEY}`);
        const d = await r.json();
        document.getElementById('grid').innerHTML = d.results.map(i => {
            const type = i.media_type || (i.first_air_date ? 'tv' : 'movie');
            return `<div class="card" onclick="handleEntry('${type}','${i.id}')"><img src="https://image.tmdb.org/t/p/w500${i.poster_path}"><div class="card-info"><div class="card-title">${i.title||i.name}</div></div></div>`;
        }).join('');
    }

    document.getElementById('search').onkeypress = async (e) => { if(e.key === 'Enter') {
        const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${CONFIG.TMDB_KEY}&query=${e.target.value}`);
        const d = await r.json();
        document.getElementById('grid').innerHTML = d.results.map(i => {
            const type = i.media_type || (i.first_air_date ? 'tv' : 'movie');
            if(!i.poster_path) return '';
            return `<div class="card" onclick="handleEntry('${type}','${i.id}')"><img src="https://image.tmdb.org/t/p/w500${i.poster_path}"><div class="card-info"><div class="card-title">${i.title||i.name}</div></div></div>`;
        }).join('');
    }};

    function changeSeason() { location.hash = `#/watch/tv/${cur.id}/${document.getElementById('s-select').value}/1`; }
    function updateStream() { location.hash = `#/watch/tv/${cur.id}/${cur.s}/${document.getElementById('e-select').value}`; }
    function playNextEpisode() { location.hash = `#/watch/tv/${cur.id}/${cur.s}/${cur.e + 1}`; }
    async function clearCloudHistory() { if(confirm("Wipe history?")) { await api('POST', { user_ip: userIP, data: {} }); location.reload(); } }

    window.onhashchange = router;
    init();
</script>
</body>
</html>
