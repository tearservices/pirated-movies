<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #bb86fc; 
            --bg: #000000; 
            --surface: rgba(40, 40, 40, 0.9); 
            --border: rgba(255, 255, 255, 0.15); 
            --danger: #ff4444; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Force Black Background */
        body, html { 
            margin: 0; padding: 0; 
            background-color: var(--bg) !important; 
            color: #ffffff !important; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100%; overflow: hidden; 
        }

        /* Profile Selection */
        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
        .profile-card { position: relative; text-align: center; width: 140px; }
        .avatar { width: 140px; height: 140px; background: #1a1a1a; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 4rem; border: 4px solid transparent; color: #444; cursor: pointer; transition: 0.25s; }
        .profile-card:hover .avatar, .profile-card:focus .avatar { border-color: #fff; transform: scale(1.05); color: #fff; }
        .del-x { position: absolute; top: -10px; right: -10px; background: var(--danger); color: white; border-radius: 50%; width: 28px; height: 28px; display: none; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; z-index: 10; border: 2px solid #000; }
        .manage-mode .del-x { display: flex; }

        /* Navigation */
        nav { padding: 25px 5%; display: flex; align-items: center; gap: 30px; position: fixed; width: 100%; z-index: 100; background: linear-gradient(to bottom, black, transparent); }
        .search-wrap { flex: 1; position: relative; max-width: 500px; }
        #search { width: 100%; padding: 12px 20px; border-radius: 4px; border: 1px solid var(--border); background: rgba(255,255,255,0.1); color: #fff; outline: none; border: 1px solid var(--border); }
        #autofill { position: absolute; top: 110%; left: 0; right: 0; background: #111; border: 1px solid var(--border); border-radius: 4px; display: none; max-height: 350px; overflow-y: auto; z-index: 200; }
        .suggest-item { padding: 10px; display: flex; gap: 15px; align-items: center; cursor: pointer; border-bottom: 1px solid var(--border); color: #fff; }

        /* Main UI */
        #main-ui { display: none; height: 100vh; flex-direction: column; background: var(--bg); }
        .scroller { flex: 1; overflow-y: auto; padding: 120px 5% 50px; scrollbar-width: none; }
        .shelf { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .card-wrap { position: relative; flex: 0 0 180px; }
        .card { width: 100%; border-radius: 4px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.25s; }
        .card:hover { border-color: #fff; transform: scale(1.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }

        /* Cinema Player Top Bar */
        #player-view { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        
        .player-top-bar { 
            position: absolute; top: 0; left: 0; right: 0; 
            padding: 20px; display: flex; align-items: center; gap: 15px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); 
            z-index: 10001; opacity: 0; transition: 0.4s ease;
        }
        #player-view:hover .player-top-bar { opacity: 1; }

        .btn-base { 
            background: var(--surface); color: #fff !important; border: 1px solid var(--border); 
            padding: 10px 18px; border-radius: 6px; font-weight: 600; 
            cursor: pointer; backdrop-filter: blur(15px); transition: 0.2s;
            font-size: 0.85rem;
        }
        .btn-base:hover { background: rgba(80, 80, 80, 1); border-color: #fff; }
        .btn-exit { background: #fff !important; color: #000 !important; border: none; }

        /* Custom Styled Selectors - High Visibility */
        .custom-select-wrap { position: relative; display: flex; }
        select.custom-select {
            appearance: none; -webkit-appearance: none;
            background: #222 !important; 
            color: #ffffff !important; 
            border: 1px solid var(--border);
            padding: 10px 40px 10px 15px; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-size: 0.85rem; font-weight: 600;
            outline: none;
        }
        select.custom-select option {
            background: #111;
            color: #fff;
        }
        .custom-select-wrap::after {
            content: '▼'; font-size: 0.6rem; position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); pointer-events: none; color: #fff;
        }

        @media (max-width: 700px) { .card-wrap { flex: 0 0 130px; } }
    </style>
</head>
<body>

<div id="profile-screen">
    <h1 style="font-weight: 300; margin-bottom: 50px; letter-spacing: 2px;">WHO'S WATCHING?</h1>
    <div id="profile-list" class="profile-grid"></div>
    <div style="display: flex; gap: 10px;">
        <button onclick="addProfile()" class="btn-base">Add Profile</button>
        <button id="manage-profiles-btn" onclick="toggleProfileManage()" class="btn-base">Manage</button>
    </div>
</div>

<div id="main-ui">
    <nav>
        <div style="font-weight: 800; font-size: 1.2rem; cursor: pointer; color: #fff;" onclick="location.hash='/'">CINEMA</div>
        <div class="search-wrap">
            <input type="text" id="search" placeholder="Search..." autocomplete="off">
            <div id="autofill"></div>
        </div>
        <div id="user-tag" style="font-weight:800; color:var(--accent); font-size: 0.8rem; letter-spacing: 1px;"></div>
    </nav>

    <div class="scroller">
        <section id="history-sec" style="display: none;">
            <h2 style="font-size:0.7rem; color:#888; letter-spacing:2px; text-transform:uppercase;">Continue Watching <button id="manage-history-btn" onclick="toggleHistoryManage()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size: 0.7rem; margin-left:10px;">[EDIT]</button></h2>
            <div id="history-shelf" class="shelf"></div>
        </section>
        <section>
            <h2 style="font-size:0.7rem; color:#888; letter-spacing:2px; text-transform:uppercase;">Trending Now</h2>
            <div id="grid" class="shelf"></div>
        </section>
    </div>
</div>

<div id="player-view">
    <div class="player-top-bar">
        <button class="btn-base btn-exit" onclick="history.back()">EXIT</button>
        <div id="series-controls" style="display: none; gap: 10px;">
            <div class="custom-select-wrap">
                <select id="s-select" class="custom-select" onchange="changeEp()"></select>
            </div>
            <div class="custom-select-wrap">
                <select id="e-select" class="custom-select" onchange="changeEp()"></select>
            </div>
        </div>
    </div>
    <div id="player-mount" style="height: 100%;"></div>
</div>

<script>
    const CONFIG = {
        DB_URL: 'https://nkjizlebtlmgmtqaonot.supabase.co',
        DB_KEY: 'sb_publishable_6orhng6zssRe45KcOFnqXQ_78xgw6Oc',
        TMDB: 'ebbc810d0c9a9a4a13a264f96897036e'
    };

    let accounts = JSON.parse(localStorage.getItem('cinema_accounts') || '[]');
    let activeUser = null, isManageProfiles = false, isManageHistory = false;

    async function router() {
        const hash = location.hash.slice(2);
        const parts = hash.split('/');
        if (!hash || hash === '/') { showView('profile-screen'); renderProfiles(); return; }
        
        activeUser = parts[0];
        document.getElementById('user-tag').innerText = activeUser.toUpperCase();
        
        if (parts.length === 1) { showView('main-ui'); initCinema(); }
        else { showView('player-view'); loadPlayer(parts[1], parts[2], parts[3]||1, parts[4]||1); }
    }

    function showView(id) {
        ['profile-screen', 'main-ui', 'player-view'].forEach(v => document.getElementById(v).style.display = (v === id ? (id==='player-view'?'block':'flex') : 'none'));
    }

    function renderProfiles() {
        const list = document.getElementById('profile-list');
        list.className = `profile-grid ${isManageProfiles ? 'manage-mode' : ''}`;
        list.innerHTML = accounts.map(user => `
            <div class="profile-card">
                <div class="del-x" onclick="deleteProfile('${user}')">×</div>
                <div class="avatar" onclick="isManageProfiles ? null : location.hash='#/${user}'">${user[0].toUpperCase()}</div>
                <div style="margin-top:10px; color:#fff; font-size:0.8rem;">${user}</div>
            </div>
        `).join('');
    }

    function toggleProfileManage() { isManageProfiles = !isManageProfiles; renderProfiles(); }
    function deleteProfile(u) { accounts = accounts.filter(a => a !== u); localStorage.setItem('cinema_accounts', JSON.stringify(accounts)); renderProfiles(); }
    function addProfile() { const n = prompt("Username:"); if (n && !accounts.includes(n)) { accounts.push(n); localStorage.setItem('cinema_accounts', JSON.stringify(accounts)); renderProfiles(); } }
    function toggleHistoryManage() { isManageHistory = !isManageHistory; document.getElementById('history-shelf').classList.toggle('manage-mode'); }

    async function loadPlayer(type, id, s, e) {
        const mount = document.getElementById('player-mount');
        const ctrl = document.getElementById('series-controls');
        const url = type === 'movie' ? `https://www.vidking.net/embed/movie/${id}` : `https://www.vidking.net/embed/tv/${id}/${s}/${e}`;
        
        mount.innerHTML = `<iframe src="${url}?autoplay=1" allow="autoplay; fullscreen" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>`;
        
        if(type === 'tv') {
            ctrl.style.display = 'flex';
            const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${CONFIG.TMDB}`);
            const data = await res.json();
            document.getElementById('s-select').innerHTML = data.seasons.filter(sea => sea.season_number > 0).map(sea => `<option value="${sea.season_number}" ${sea.season_number == s ? 'selected':''}>Season ${sea.season_number}</option>`).join('');
            
            const epRes = await fetch(`https://api.themoviedb.org/3/tv/${id}/season/${s}?api_key=${CONFIG.TMDB}`);
            const epData = await epRes.json();
            document.getElementById('e-select').innerHTML = epData.episodes.map(ep => `<option value="${ep.episode_number}" ${ep.episode_number == e ? 'selected':''}>Ep ${ep.episode_number}: ${ep.name}</option>`).join('');
        } else { ctrl.style.display = 'none'; }
        saveProgress(id, type, s, e);
    }

    function changeEp() {
        const hash = location.hash.split('/');
        const s = document.getElementById('s-select').value;
        const e = document.getElementById('e-select').value;
        location.hash = `#/${activeUser}/tv/${hash[3]}/${s}/${e}`;
    }

    async function db(method, body = null) {
        const options = { method, headers: { 'apikey': CONFIG.DB_KEY, 'Authorization': `Bearer ${CONFIG.DB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' }};
        if (body) options.body = JSON.stringify(body);
        const url = `${CONFIG.DB_URL}/rest/v1/watch_history?user_ip=eq.${encodeURIComponent(activeUser)}`;
        const res = await fetch(url, options);
        return res.ok ? await res.json() : [];
    }

    async function saveProgress(id, type, s, e) {
        const res = await db('GET');
        let history = res[0]?.data || {};
        history[id] = { type, s, e, last: Date.now() };
        await db('POST', { user_ip: activeUser, data: history });
    }

    async function deleteHistoryItem(id) {
        const res = await db('GET');
        let history = res[0]?.data || {};
        delete history[id];
        await db('POST', { user_ip: activeUser, data: history });
        loadHistory();
    }

    async function initCinema() {
        loadHistory();
        const r = await fetch(`https://api.themoviedb.org/3/trending/all/day?api_key=${CONFIG.TMDB}`);
        const d = await r.json();
        document.getElementById('grid').innerHTML = d.results.map(i => `
            <div class="card-wrap"><div class="card" onclick="location.hash='#/${activeUser}/${i.media_type||'movie'}/${i.id}'">
                <img src="https://image.tmdb.org/t/p/w500${i.poster_path}">
            </div></div>`).join('');
    }

    async function loadHistory() {
        const data = await db('GET');
        const shelf = document.getElementById('history-shelf');
        if (data?.[0]?.data && Object.keys(data[0].data).length > 0) {
            document.getElementById('history-sec').style.display = 'block';
            shelf.innerHTML = '';
            const entries = Object.entries(data[0].data).sort((a,b) => b[1].last - a[1].last).slice(0, 12);
            for (const [id, meta] of entries) {
                const r = await fetch(`https://api.themoviedb.org/3/${meta.type}/${id}?api_key=${CONFIG.TMDB}`);
                const m = await r.json();
                const route = meta.type === 'tv' ? `${meta.type}/${id}/${meta.s}/${meta.e}` : `${meta.type}/${id}`;
                shelf.innerHTML += `<div class="card-wrap"><div class="del-x" onclick="deleteHistoryItem('${id}')">×</div><div class="card" onclick="isManageHistory ? null : location.hash='#/${activeUser}/${route}'"><img src="https://image.tmdb.org/t/p/w342${m.poster_path}"></div></div>`;
            }
        } else { document.getElementById('history-sec').style.display = 'none'; }
    }

    const sInput = document.getElementById('search');
    const sDrop = document.getElementById('autofill');
    sInput.addEventListener('input', async () => {
        if (sInput.value.length < 2) { sDrop.style.display = 'none'; return; }
        const r = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${CONFIG.TMDB}&query=${encodeURIComponent(sInput.value)}`);
        const d = await r.json();
        sDrop.innerHTML = d.results.filter(i => i.poster_path).slice(0, 5).map(i => `
            <div class="suggest-item" onclick="location.hash='#/${activeUser}/${i.media_type||'movie'}/${i.id}'">
                <img src="https://image.tmdb.org/t/p/w92${i.poster_path}" style="width:30px; height:45px; object-fit:cover; border-radius:2px;">
                <span style="font-size:0.85rem;">${i.title||i.name}</span>
            </div>`).join('');
        sDrop.style.display = 'block';
    });
    document.addEventListener('click', e => { if(!e.target.closest('.search-wrap')) sDrop.style.display = 'none'; });

    window.onhashchange = router;
    router();
</script>
</body>
</html>
